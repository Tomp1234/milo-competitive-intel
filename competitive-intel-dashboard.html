<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milo Competitive Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* ============================================
   MILO COMPETITIVE INTELLIGENCE DASHBOARD
   Internal GTM tool — quick scanning, staying current
   ============================================ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg-primary: #0a0a14;
  --bg-secondary: #12121f;
  --bg-card: #181828;
  --bg-card-hover: #1e1e32;
  --bg-surface: #222238;
  --border-subtle: rgba(124, 58, 237, 0.15);
  --border-card: rgba(255, 255, 255, 0.06);
  --purple-primary: #7c3aed;
  --purple-light: #a78bfa;
  --purple-glow: rgba(124, 58, 237, 0.3);
  --purple-subtle: rgba(124, 58, 237, 0.08);
  --text-primary: #f0f0f5;
  --text-secondary: #9495a7;
  --text-muted: #5f6078;
  --green: #22c55e;
  --green-bg: rgba(34, 197, 94, 0.12);
  --amber: #f59e0b;
  --amber-bg: rgba(245, 158, 11, 0.12);
  --red: #ef4444;
  --red-bg: rgba(239, 68, 68, 0.12);
  --blue: #3b82f6;
  --blue-bg: rgba(59, 130, 246, 0.12);
  --cyan: #06b6d4;
  --cyan-bg: rgba(6, 182, 212, 0.12);
  --gray: #6b7280;
  --gray-bg: rgba(107, 114, 128, 0.12);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-surface); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--purple-primary); }

/* Layout */
.dashboard {
  max-width: 1440px;
  margin: 0 auto;
  padding: 32px 40px 80px;
}

/* ===== HEADER ===== */
.header {
  margin-bottom: 32px;
}

.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 24px;
}

.header-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text-primary);
}

.header-title span {
  color: var(--purple-primary);
}

.header-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 4px;
  font-weight: 400;
}

.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--purple-subtle);
  border: 1px solid var(--border-subtle);
  border-radius: 20px;
  font-size: 12px;
  color: var(--purple-light);
  font-weight: 500;
}

.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: 12px;
  padding: 20px;
  transition: border-color 0.2s;
}

.stat-card:hover {
  border-color: var(--border-subtle);
}

.stat-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.stat-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-primary);
}

.stat-value .stat-unit {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-left: 4px;
}

/* ===== TWO COLUMN LAYOUT: Intel Feed + ICP Overlap ===== */
.primary-sections {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 32px;
}

/* ===== SECTION HEADERS ===== */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.section-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title i {
  color: var(--purple-primary);
  width: 20px;
  height: 20px;
}

.section-badge {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 4px 10px;
  border-radius: 10px;
  background: var(--purple-subtle);
  color: var(--purple-light);
}

/* ===== INTEL FEED ===== */
.intel-feed-container {
  background: var(--bg-secondary);
  border: 1px solid var(--border-card);
  border-radius: 16px;
  padding: 24px;
}

.feed-filters {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.feed-filter {
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--border-card);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}

.feed-filter:hover {
  border-color: var(--border-subtle);
  color: var(--text-primary);
}

.feed-filter.active {
  background: var(--purple-primary);
  border-color: var(--purple-primary);
  color: white;
}

.feed-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.feed-item {
  display: flex;
  gap: 14px;
  padding: 14px 16px;
  border-radius: 10px;
  transition: background 0.2s;
  align-items: flex-start;
}

.feed-item:hover {
  background: var(--bg-card);
}

.feed-date {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  min-width: 80px;
  padding-top: 2px;
  white-space: nowrap;
}

.feed-content {
  flex: 1;
}

.feed-company {
  font-weight: 600;
  font-size: 13px;
  margin-bottom: 3px;
}

.feed-detail {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.45;
}

.event-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  flex-shrink: 0;
  margin-top: 2px;
}

.event-badge.funding {
  background: var(--green-bg);
  color: var(--green);
}

.event-badge.acquisition {
  background: var(--blue-bg);
  color: var(--blue);
}

.event-badge.launch {
  background: var(--cyan-bg);
  color: var(--cyan);
}

.event-badge.decline {
  background: var(--red-bg);
  color: var(--red);
}

.feed-empty {
  padding: 24px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
  font-style: italic;
}

/* ===== ICP OVERLAP ===== */
.icp-container {
  background: var(--bg-secondary);
  border: 1px solid var(--border-card);
  border-radius: 16px;
  padding: 24px;
}

.icp-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 20px;
  line-height: 1.5;
}

.icp-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.icp-item {
  padding: 14px 16px;
  border-radius: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  transition: border-color 0.2s;
}

.icp-item:hover {
  border-color: var(--border-subtle);
}

.icp-item.acquired {
  opacity: 0.5;
}

.icp-item-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.icp-item-name {
  font-weight: 600;
  font-size: 14px;
}

.icp-score-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 6px;
}

.icp-score-badge.high {
  background: var(--red-bg);
  color: var(--red);
}

.icp-score-badge.medium {
  background: var(--amber-bg);
  color: var(--amber);
}

.icp-score-badge.low {
  background: var(--green-bg);
  color: var(--green);
}

.icp-bar-track {
  height: 6px;
  background: var(--bg-surface);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 8px;
}

.icp-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
}

.icp-bar-fill.high {
  width: 85%;
  background: linear-gradient(90deg, var(--red), #f87171);
}

.icp-bar-fill.medium {
  width: 50%;
  background: linear-gradient(90deg, var(--amber), #fbbf24);
}

.icp-bar-fill.low {
  width: 20%;
  background: linear-gradient(90deg, var(--green), #4ade80);
}

.icp-rationale {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.45;
}

/* ===== MARKET MAP ===== */
.market-map-section {
  margin-bottom: 32px;
}

.market-map-wrapper {
  background: var(--bg-secondary);
  border: 1px solid var(--border-card);
  border-radius: 16px;
  padding: 24px;
}

.market-map {
  position: relative;
  width: 100%;
  height: 400px;
  background: var(--bg-card);
  border-radius: 12px;
  overflow: hidden;
}

/* Grid lines */
.map-grid {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.map-grid-line-h, .map-grid-line-v {
  position: absolute;
  background: rgba(255, 255, 255, 0.03);
}

.map-grid-line-h {
  width: 100%;
  height: 1px;
  left: 0;
  top: 50%;
}

.map-grid-line-v {
  height: 100%;
  width: 1px;
  top: 0;
  left: 50%;
}

/* Axis labels */
.map-axis-label {
  position: absolute;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  pointer-events: none;
}

.map-axis-label.left { left: 20px; top: 50%; transform: translateY(-50%); }
.map-axis-label.right { right: 20px; top: 50%; transform: translateY(-50%); }
.map-axis-label.top { top: 12px; left: 50%; transform: translateX(-50%); }
.map-axis-label.bottom { bottom: 12px; left: 50%; transform: translateX(-50%); }

/* Quadrant labels */
.map-quadrant-label {
  position: absolute;
  font-size: 10px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.06);
  pointer-events: none;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Dots */
.map-dot {
  position: absolute;
  transform: translate(-50%, -50%);
  cursor: pointer;
  z-index: 2;
  transition: transform 0.2s, z-index 0s;
}

.map-dot:hover {
  transform: translate(-50%, -50%) scale(1.15);
  z-index: 10;
}

.map-dot-circle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  border: 2px solid rgba(255, 255, 255, 0.1);
  position: relative;
}

.map-dot.milo .map-dot-circle {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, #7c3aed, #a78bfa);
  border: 2px solid var(--purple-light);
  font-size: 13px;
  box-shadow: 0 0 20px var(--purple-glow), 0 0 40px rgba(124, 58, 237, 0.15);
}

.map-dot-label {
  position: absolute;
  top: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-secondary);
  white-space: nowrap;
  pointer-events: none;
}

.map-dot.milo .map-dot-label {
  color: var(--purple-light);
  font-size: 11px;
}

/* Map tooltip */
.map-tooltip {
  position: absolute;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 10px;
  padding: 12px 16px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 100;
  max-width: 260px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

.map-tooltip.visible {
  opacity: 1;
}

.map-tooltip-name {
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 4px;
}

.map-tooltip-desc {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.4;
}

/* ===== MARKET NARRATIVE ===== */
.market-narrative {
  margin-top: 20px;
  padding: 20px 24px;
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: 12px;
  border-left: 3px solid var(--purple-primary);
}

.narrative-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--purple-light);
  margin-bottom: 8px;
}

.narrative-text {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.65;
  font-style: italic;
}

.narrative-text[contenteditable="true"]:focus {
  outline: none;
  color: var(--text-primary);
}

/* ===== COMPETITOR CARDS ===== */
.cards-section {
  margin-bottom: 32px;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

.competitor-card {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: 14px;
  padding: 22px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}

.competitor-card:hover {
  border-color: var(--border-subtle);
  background: var(--bg-card-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
}

.competitor-card.acquired {
  opacity: 0.55;
}

.competitor-card.acquired::after {
  content: 'ACQUIRED';
  position: absolute;
  top: 14px;
  right: -28px;
  background: var(--gray);
  color: white;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 32px;
  transform: rotate(45deg);
}

.competitor-card.shutdown {
  opacity: 0.55;
}

.competitor-card.shutdown::after {
  content: 'SHUTDOWN';
  position: absolute;
  top: 14px;
  right: -28px;
  background: var(--red);
  color: white;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 32px;
  transform: rotate(45deg);
}

.card-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}

.card-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  color: white;
  flex-shrink: 0;
}

.card-name {
  font-size: 16px;
  font-weight: 700;
}

.card-name a {
  color: var(--text-primary);
  text-decoration: none;
  transition: color 0.2s;
}

.card-name a:hover {
  color: var(--purple-light);
  text-decoration: underline;
  text-underline-offset: 3px;
}

.card-meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.card-description {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 16px;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}

.card-tag {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
}

.card-tag.segment {
  background: var(--purple-subtle);
  color: var(--purple-light);
}

.card-tag.threat-high {
  background: var(--red-bg);
  color: var(--red);
}

.card-tag.threat-medium {
  background: var(--amber-bg);
  color: var(--amber);
}

.card-tag.threat-low {
  background: var(--green-bg);
  color: var(--green);
}

.card-tag.threat-none {
  background: var(--gray-bg);
  color: var(--gray);
}

.card-tag.overlap-high {
  background: var(--red-bg);
  color: var(--red);
}

.card-tag.overlap-medium {
  background: var(--amber-bg);
  color: var(--amber);
}

.card-tag.overlap-low {
  background: var(--green-bg);
  color: var(--green);
}

.card-customers {
  font-size: 11px;
  color: var(--text-muted);
}

.card-customers span {
  color: var(--text-secondary);
}

.card-expand-hint {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 14px;
  display: flex;
  align-items: center;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.2s;
}

.competitor-card:hover .card-expand-hint {
  opacity: 1;
}

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}

.modal-overlay.active {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border-card);
  border-radius: 20px;
  width: 90%;
  max-width: 640px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 32px;
  transform: translateY(20px) scale(0.97);
  transition: transform 0.25s;
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
}

.modal-overlay.active .modal {
  transform: translateY(0) scale(1);
}

.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: var(--bg-surface);
  border: none;
  color: var(--text-secondary);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}

.modal-close:hover {
  background: var(--purple-primary);
  color: white;
}

.modal-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  position: relative;
}

.modal-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 20px;
  color: white;
  flex-shrink: 0;
}

.modal-name {
  font-size: 22px;
  font-weight: 700;
}

.modal-meta {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.modal-section {
  margin-bottom: 22px;
}

.modal-section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.modal-section p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.modal-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.modal-customers-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.modal-customer {
  padding: 4px 12px;
  background: var(--bg-surface);
  border-radius: 6px;
  font-size: 12px;
  color: var(--text-secondary);
}

.modal-events {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.modal-event {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 10px 14px;
  background: var(--bg-card);
  border-radius: 8px;
}

.modal-event-date {
  font-size: 11px;
  color: var(--text-muted);
  min-width: 72px;
  padding-top: 1px;
}

.modal-event-detail {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.4;
}

.modal-no-data {
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  .primary-sections {
    grid-template-columns: 1fr;
  }
  .stats-bar {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 768px) {
  .dashboard {
    padding: 20px 16px 60px;
  }
  .stats-bar {
    grid-template-columns: 1fr 1fr;
  }
  .cards-grid {
    grid-template-columns: 1fr;
  }
  .header-top {
    flex-direction: column;
    gap: 12px;
  }
  .market-map {
    height: 320px;
  }
}
</style>
</head>
<body>

<script>

function getInitial(name) {
  return name.charAt(0).toUpperCase();
}

// Parse funding amount for stats
function parseFunding(str) {
  const match = str.match(/\$([\d.]+)M/);
  return match ? parseFloat(match[1]) : 0;
}

// Format date
function formatDate(dateStr) {
  const d = new Date(dateStr);
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${months[d.getMonth()]} ${d.getFullYear()}`;
}

// Compute stats
function getStats() {
  const totalCompetitors = competitors.length;
  const totalFunding = competitors.reduce((sum, c) => sum + parseFunding(c.funding), 0);
  const acquisitions = competitors.filter(c => c.status === 'acquired').length;
  const shutdowns = competitors.filter(c => c.status === 'shutdown').length;
  const inactive = acquisitions + shutdowns;
  const totalEvents = competitors.reduce((sum, c) => sum + c.events.length, 0);

  // Latest event date for freshness indicator
  let latestEventDate = null;
  competitors.forEach(c => {
    c.events.forEach(e => {
      const d = new Date(e.date);
      if (!latestEventDate || d > latestEventDate) latestEventDate = d;
    });
  });

  return { totalCompetitors, totalFunding, inactive, totalEvents, latestEventDate };
}

// Get all events, sorted newest first
function getAllEvents(filterType) {
  let events = [];
  competitors.forEach(c => {
    c.events.forEach(e => {
      events.push({ ...e, companyName: c.name, companyId: c.id });
    });
  });
  events.sort((a, b) => new Date(b.date) - new Date(a.date));
  if (filterType && filterType !== 'All') {
    events = events.filter(e => e.type === filterType);
  }
  return events;
}

// Market map coordinates — spread midmarket cluster
function getMapPosition(comp, index) {
  const marketX = {
    midmarket: 28,
    enterprise: 75
  };
  const fundingY = {
    seed: 78,
    low: 68,
    medium: 42,
    high: 18
  };

  let x = marketX[comp.targetMarket] || 50;
  let y = fundingY[comp.fundingLevel] || 50;

  // Spread midmarket/low cluster
  const offsets = {
    julius: { x: -8, y: -4 },
    datagpt: { x: 6, y: 3 },
    querio: { x: -12, y: 6 },
    wobby: { x: 12, y: -6 },
    lumiai: { x: -4, y: 10 },
    zenlytic: { x: 4, y: -2 },
    tellius: { x: -6, y: 0 },
    wisdomai: { x: 4, y: 2 }
  };

  if (offsets[comp.id]) {
    x += offsets[comp.id].x;
    y += offsets[comp.id].y;
  }

  return { x: Math.max(8, Math.min(92, x)), y: Math.max(8, Math.min(92, y)) };
}

function getMiloMapPosition() {
  return { x: 22, y: 82 };
}

function renderFeed(filter) {
  const feedList = document.getElementById('feedList');
  const events = getAllEvents(filter);

  if (events.length === 0) {
    feedList.innerHTML = '<div class="feed-empty">No intel matching this filter.</div>';
    return;
  }

  feedList.innerHTML = events.map(e => `
    <div class="feed-item">
      <div class="feed-date">${formatDate(e.date)}</div>
      <span class="event-badge ${e.type.toLowerCase()}">${e.type}</span>
      <div class="feed-content">
        <div class="feed-company" style="color: ${getCompanyColor(e.companyId)}">${e.companyName}</div>
        <div class="feed-detail">${e.detail}</div>
      </div>
    </div>
  `).join('');
}

      <p>${c.icpRationale}</p>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Customer Verticals</div>
      <p>${c.knownCustomerTypes}</p>
    </div>

    ${c.knownCustomers.length > 0 ? `
    <div class="modal-section">
      <div class="modal-section-title">Known Customers</div>
      <div class="modal-customers-list">
        ${c.knownCustomers.map(cust => `<span class="modal-customer">${cust}</span>`).join('')}
      </div>
    </div>
    ` : ''}

    <div class="modal-section">
      <div class="modal-section-title">Recent Intel</div>
      ${c.events.length > 0 ? `
        <div class="modal-events">
          ${c.events.map(e => `
            <div class="modal-event">
              <span class="modal-event-date">${formatDate(e.date)}</span>
              <span class="event-badge ${e.type.toLowerCase()}">${e.type}</span>
              <span class="modal-event-detail">${e.detail}</span>
            </div>
          `).join('')}
        </div>
      ` : '<div class="modal-no-data">No recent intel tracked.</div>'}
    </div>
  `;

  overlay.classList.add('active');
  lucide.createIcons();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function initInteractions() {
  // Feed filters
  document.getElementById('feedFilters').addEventListener('click', (e) => {
    if (e.target.classList.contains('feed-filter')) {
      document.querySelectorAll('.feed-filter').forEach(f => f.classList.remove('active'));
      e.target.classList.add('active');
      renderFeed(e.target.dataset.filter);
    }
  });

  // Card clicks → modal
  document.getElementById('cardsGrid').addEventListener('click', (e) => {
    const card = e.target.closest('.competitor-card');
    if (card) openModal(card.dataset.id);
  });

  // Modal overlay close
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });

  // Escape to close modal
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // Market map tooltips
  const tooltip = document.getElementById('mapTooltip');
  const map = document.getElementById('marketMap');

  map.addEventListener('mouseover', (e) => {
    const dot = e.target.closest('.map-dot');
    if (!dot) return;

    const id = dot.dataset.id;
    let name, desc;

    if (dot.classList.contains('milo')) {
      name = 'Milo';
      desc = 'You are here. Pre-seed, mid-market focus, UK/EU.';
    } else {
      const c = competitors.find(comp => comp.id === id);
      if (!c) return;
      name = c.name;
      desc = `${c.funding} · ${c.targetSegment} · Threat: ${c.threatLevel}`;
    }

    document.getElementById('tooltipName').textContent = name;
    document.getElementById('tooltipDesc').textContent = desc;

    const mapRect = map.getBoundingClientRect();
    const dotRect = dot.getBoundingClientRect();
    const tooltipEl = tooltip;

    let left = dotRect.left - mapRect.left + dotRect.width / 2;
    let top = dotRect.top - mapRect.top - 10;

    // Position above dot, centered
    tooltipEl.style.left = `${left}px`;
    tooltipEl.style.top = `${top}px`;
    tooltipEl.style.transform = 'translate(-50%, -100%)';

    tooltipEl.classList.add('visible');
  });

  map.addEventListener('mouseout', (e) => {
    const dot = e.target.closest('.map-dot');
    if (dot) {
      tooltip.classList.remove('visible');
    }
  });

  // Map dot click → modal
  map.addEventListener('click', (e) => {
    const dot = e.target.closest('.map-dot');
    if (dot && !dot.classList.contains('milo') && dot.dataset.id) {
      openModal(dot.dataset.id);
    }
  });
}

// Boot
document.addEventListener('DOMContentLoaded', render);
</script>

<div id="app"></div>

</body>
</html>
